<head>

<title>tutask — 依赖关系任务管理</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20width=%22512%22%20height=%22512%22%20viewBox=%220%200%20512%20512%22%20role=%22img%22%20xmlns=%22http://www.w3.org/2000/svg%22%3E%3Ctitle%3Etutask%3C/title%3E%3Cdesc%3EA%20dependency%20graph:%20a%20green%20completed%20root%20node%20branches%20to%20a%20blue%20and%20a%20gray%20node,%20leading%20to%20a%20glowing%20golden%20node%20that%20signals%20the%20next%20task%20ready%20to%20start.%3C/desc%3E%3Cdefs%3E%3ClinearGradient%20id=%22bg%22%20x1=%220%22%20y1=%220%22%20x2=%221%22%20y2=%221%22%3E%3Cstop%20offset=%220%22%20stop-color=%22%233730A3%22/%3E%3Cstop%20offset=%221%22%20stop-color=%22%231E1B4B%22/%3E%3C/linearGradient%3E%3ClinearGradient%20id=%22gold%22%20x1=%220%22%20y1=%220%22%20x2=%221%22%20y2=%221%22%3E%3Cstop%20offset=%220%22%20stop-color=%22%23FCD34D%22/%3E%3Cstop%20offset=%221%22%20stop-color=%22%23F59E0B%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20x=%2216%22%20y=%2216%22%20width=%22480%22%20height=%22480%22%20rx=%22108%22%20fill=%22url(%23bg)%22/%3E%3Crect%20x=%2216.5%22%20y=%2216.5%22%20width=%22479%22%20height=%22479%22%20rx=%22107.5%22%20fill=%22none%22%20stroke=%22%23FFFFFF%22%20stroke-opacity=%220.10%22%20stroke-width=%221%22/%3E%3Cg%20stroke=%22%23A5B4FC%22%20stroke-opacity=%220.55%22%20stroke-width=%227%22%20stroke-linecap=%22round%22%3E%3Cline%20x1=%22232%22%20y1=%22168%22%20x2=%22128%22%20y2=%22252%22/%3E%3Cline%20x1=%22232%22%20y1=%22344%22%20x2=%22128%22%20y2=%22268%22/%3E%3Cline%20x1=%22344%22%20y1=%22252%22%20x2=%22244%22%20y2=%22174%22/%3E%3Cline%20x1=%22344%22%20y1=%22268%22%20x2=%22244%22%20y2=%22338%22/%3E%3C/g%3E%3Ccircle%20cx=%22116%22%20cy=%22260%22%20r=%2233%22%20fill=%22%2334D399%22/%3E%3Cpath%20d=%22M104%20260%20l9%209%20l16%20-17%22%20fill=%22none%22%20stroke=%22%23064E3B%22%20stroke-width=%226%22%20stroke-linecap=%22round%22%20stroke-linejoin=%22round%22/%3E%3Ccircle%20cx=%22232%22%20cy=%22168%22%20r=%2229%22%20fill=%22%2360A5FA%22/%3E%3Ccircle%20cx=%22232%22%20cy=%22344%22%20r=%2229%22%20fill=%22%2394A3B8%22/%3E%3Ccircle%20cx=%22348%22%20cy=%22260%22%20r=%2282%22%20fill=%22%23FBBF24%22%20fill-opacity=%220.08%22/%3E%3Ccircle%20cx=%22348%22%20cy=%22260%22%20r=%2264%22%20fill=%22%23FBBF24%22%20fill-opacity=%220.13%22/%3E%3Ccircle%20cx=%22348%22%20cy=%22260%22%20r=%2248%22%20fill=%22%23FBBF24%22%20fill-opacity=%220.20%22/%3E%3Ccircle%20cx=%22348%22%20cy=%22260%22%20r=%2238%22%20fill=%22url(%23gold)%22/%3E%3Ccircle%20cx=%22348%22%20cy=%22260%22%20r=%2238%22%20fill=%22none%22%20stroke=%22%23FFFFFF%22%20stroke-opacity=%220.5%22%20stroke-width=%222%22/%3E%3C/svg%3E">
<!-- BUILD:STYLE -->
<link rel="stylesheet" href="styles.css">
<!-- /BUILD:STYLE -->
</head>
<body>
<div id="toolbar">
  <div id="goalControl">
    <span id="goalName" tabindex="0" title="点击重命名"></span>
    <input id="goalNameInput" title="Goal 标题（改名）" placeholder="目标名称" hidden>
    <button id="goalMenuBtn" title="切换 / 新建 / 删除 Goal" aria-label="Goal 菜单"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
    <div id="goalMenu" hidden></div>
  </div>
</div>
<div id="cornerControls">
  <div id="timelineControls" hidden role="group" aria-label="时间轴设置">
    <div class="tl-seg" id="tlScale" role="group" aria-label="时间尺度">
      <button data-scale="day" title="按天">日</button>
      <button data-scale="week" title="按周">周</button>
      <button data-scale="month" title="按月">月</button>
    </div>
    <div class="tl-seg" id="tlRange" role="group" aria-label="轴范围">
      <button data-range="continuous" title="连续：含空列，距离成比例">连续</button>
      <button data-range="compact" title="紧凑：只画有任务的时间桶">紧凑</button>
    </div>
  </div>
  <button id="btnTimeline" title="切换时间轴布局" aria-label="切换时间轴布局" aria-pressed="false">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 12h18"></path>
      <path d="M6 8v8"></path>
      <path d="M12 8v8"></path>
      <path d="M18 8v8"></path>
    </svg>
  </button>
  <button id="btnDirection" title="切换展示方向" aria-label="切换展示方向" aria-pressed="false">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 7H4l4-4"></path>
      <path d="M4 7h16"></path>
      <path d="M16 17h4l-4 4"></path>
      <path d="M20 17H4"></path>
    </svg>
  </button>
  <div id="infoControl">
    <button id="btnInfo" title="操作说明" aria-label="操作说明" aria-expanded="false" aria-controls="hint">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 16v-4"></path>
        <path d="M12 8h.01"></path>
      </svg>
    </button>
    <div id="hint" role="dialog" aria-label="操作说明" hidden>单击节点选中 · 双击节点详情 · Ctrl/⌘+Z 撤销 · Tab 后继任务 · Enter 并行任务 · Space 切节点状态 · D 详情 · 拖动⚪连线 · 右键连线删除 · 双击空白新建</div>
  </div>
  <div id="zoomControls" aria-label="视图缩放">
    <span id="zoomLabel">100%</span>
    <button id="btnZoomReset" title="重置缩放与平移">重置视图</button>
  </div>
</div>
<input type="file" id="importFile" accept=".json,application/json">
<div id="storageWarning" class="warning-bar" hidden>
  ⚠️ 本地存储不可用，更改不会自动保存——请及时手动导出 JSON
</div>
<div id="fileReconnectBar" class="warning-bar" hidden>
  检测到已绑定的数据文件<button id="btnFileReconnect">重新连接</button>
</div>
<div id="canvas">
  <div id="world">
    <div id="ruler" hidden></div>
    <svg id="edges"></svg>
    <div id="nodes"></div>
  </div>
</div>
<!-- BUILD:SCRIPT -->
<script type="module" src="ui/main.js"></script>
<!-- /BUILD:SCRIPT -->
</body>
</html>
